<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — QuoteFleet</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/premium-palette.css">
  <link rel="stylesheet" href="/dashboard-polish.css">
  <link rel="stylesheet" href="/dashboard-setup.css">
  <link rel="stylesheet" href="/dashboard-preview.css">
  <link rel="stylesheet" href="/rate-builder.css">
  <link rel="stylesheet" href="/setup-builder.css">
  <link rel="stylesheet" href="/brand-editor.css">
  <link rel="stylesheet" href="/ai-setup.css">
  <link rel="stylesheet" href="/premium-saas-polish.css">
  <link rel="stylesheet" href="/app-quote-actions.css">
  <link rel="stylesheet" href="/embed-launch-studio.css">
  <link rel="stylesheet" href="/dashboard-freight-shell.css">
  <link rel="stylesheet" href="/overview-executive-polish.css">
  <link rel="stylesheet" href="/lead-queue-search.css">
  <link rel="stylesheet" href="/lead-detail-command.css">
  <link rel="stylesheet" href="/callback-queue-search.css">
  <link rel="stylesheet" href="/rate-card-search.css">
  <link rel="stylesheet" href="/accessorial-search.css">
  <link rel="stylesheet" href="/drayage-zone-search.css">
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('qf-theme');
        var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <div class="app-shell" id="app-shell" hidden>
    <button class="qf-mobile-nav-toggle" id="qf-mobile-nav-toggle" aria-label="Open navigation menu" aria-controls="qf-sidebar" aria-expanded="false" hidden><span aria-hidden="true">☰</span></button>
    <aside class="sidebar" id="qf-sidebar">
      <div class="brand-block"><div class="name" id="sb-tenant-name">…</div><div class="sub" id="sb-tenant-slug">…</div></div>
      <button class="nav-item active" data-route="overview" aria-label="Overview"><span aria-hidden="true">📊</span> Overview</button>
      <button class="nav-item" data-route="leads" aria-label="Leads"><span aria-hidden="true">📥</span> Leads</button>
      <button class="nav-item" data-route="callbacks" aria-label="Callbacks"><span aria-hidden="true">📞</span> Callbacks</button>
      <button class="nav-item" data-route="rates" aria-label="Rate cards"><span aria-hidden="true">💰</span> Rate cards</button>
      <button class="nav-item" data-route="accessorials" aria-label="Accessorials"><span aria-hidden="true">➕</span> Accessorials</button>
      <button class="nav-item" data-route="zones" aria-label="Drayage zones"><span aria-hidden="true">📍</span> Drayage zones</button>
      <button class="nav-item" data-route="ai" aria-label="AI agent"><span aria-hidden="true">🤖</span> AI agent</button>
      <button class="nav-item" data-route="ingest" aria-label="AI import"><span aria-hidden="true">📤</span> AI import</button>
      <button class="nav-item" data-route="brand" aria-label="Brand"><span aria-hidden="true">🎨</span> Brand</button>
      <button class="nav-item" data-route="embed" aria-label="Embed code"><span aria-hidden="true">📋</span> Embed code</button>
      <div class="group">Account</div>
      <button class="nav-item" data-route="account" aria-label="Account"><span aria-hidden="true">👤</span> Account</button>
      <button class="nav-item" data-route="audit" aria-label="Audit log"><span aria-hidden="true">📜</span> Audit log</button>
      <a href="/" target="_blank" rel="noopener" aria-label="View public widget">↗ View public widget</a>
      <button class="qf-theme-toggle" id="qf-theme-toggle" aria-label="Toggle light/dark theme"><span id="qf-theme-icon" aria-hidden="true">🌙</span><span id="qf-theme-label">Dark</span></button>
      <button class="nav-item" id="sb-logout" aria-label="Sign out">↩ Sign out</button>
    </aside>
    <main class="app-main"><div id="page-content"></div></main>
  </div>
  <style>
    .qf-mobile-nav-toggle { position: fixed; top: 12px; left: 12px; z-index: 1001; width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border-strong); background: var(--surface); font-size: 20px; line-height: 38px; padding: 0; cursor: pointer; color: var(--ink); transition: background 0.15s ease; }
    .qf-mobile-nav-toggle:hover { background: var(--surface-2); }
    @media (min-width: 901px) { .app-shell.qf-nav-collapsed .sidebar { display: none; } .app-shell.qf-nav-collapsed .app-main { margin-left: 0; } }
    @media (max-width: 900px) { .app-shell .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 260px; max-width: 80vw; transform: translateX(-100%); transition: transform 0.18s ease; z-index: 1000; box-shadow: 4px 0 20px rgba(0,0,0,0.2); overflow-y: auto; } .app-shell.qf-nav-open .sidebar { transform: translateX(0); } .app-main { padding-top: 60px; } }
    body.qf-trial-locked .app-main input, body.qf-trial-locked .app-main select, body.qf-trial-locked .app-main textarea { pointer-events: none; opacity: 0.55; cursor: not-allowed; }
    body.qf-trial-locked .app-main .btn-primary, body.qf-trial-locked .app-main .btn-danger, body.qf-trial-locked .app-main button[data-mutate] { pointer-events: none; opacity: 0.55; cursor: not-allowed; }
  </style>
  <div id="loading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--muted);"><div>Loading dashboard<span class="dots"></span></div></div>
  <script src="/app.js"></script>
  <script src="/premium-saas-polish.js"></script>
  <script src="/embed-launch-studio.js"></script>
  <script src="/overview-executive-polish.js"></script>
  <script src="/lead-queue-search.js"></script>
  <script src="/lead-detail-command.js"></script>
  <script src="/callback-queue-search.js"></script>
  <script src="/rate-card-search.js"></script>
  <script src="/accessorial-search.js"></script>
  <script src="/drayage-zone-search.js"></script>
  <script src="/dashboard-setup.js"></script>
  <script src="/dashboard-preview.js"></script>
  <script src="/rate-builder.js"></script>
  <script src="/setup-builder.js"></script>
  <script src="/brand-editor.js"></script>
  <script src="/ai-setup.js"></script>
  <script src="/app-quote-actions.js"></script>
  <script src="/app-quote-activity.js"></script>
  <script src="/app-accessorial-tools.js"></script>
  <script src="/app-carrier-profile.js"></script>
</body>
</html>
