  <script>
    (function () {
      // Explicit user-controlled day/night theme. Default = dark (brand),
      // matching the always-dark public marketing site. The saved choice is
      // applied here — before first paint — so there is no light/dark flash.
      // NOT tied to OS prefers-color-scheme; only the sidebar toggle flips it.
      try {
        if (localStorage.getItem('qf-theme') === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
      } catch (e) { /* default dark */ }
    })();
  </script>

  <style>
    .qf-mobile-nav-toggle { display: none; align-items: center; justify-content: center; position: fixed; top: 12px; left: 12px; z-index: 1001; width: 40px; height: 40px; border-radius: 4px; border: 1px solid var(--border-strong); background: var(--surface); padding: 0; cursor: pointer; color: var(--ink); transition: background 0.15s ease; }
    .qf-mobile-nav-toggle:hover { background: var(--surface-2); }
    /* Hamburger and sidebar are mutually exclusive. The sidebar goes off-canvas
       at ≤900px — the same boundary JS uses for isDesktop() (≥901) — so the
       toggle is shown ONLY when the sidebar is not visible: off-canvas on mobile,
       or explicitly collapsed on desktop. Above 900px with the sidebar showing,
       the toggle stays display:none (no stray floating control). */
    @media (max-width: 900px) { .qf-mobile-nav-toggle { display: inline-flex; } }
    @media (min-width: 901px) { .app-shell.qf-nav-collapsed .sidebar { display: none; } .app-shell.qf-nav-collapsed .app-main { margin-left: 0; } .qf-nav-scrim { display: none; } .app-shell.qf-nav-collapsed .qf-mobile-nav-toggle { display: inline-flex; } }
    @media (max-width: 900px) { .app-shell .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 260px; max-width: 80vw; padding-top: 56px; transform: translateX(-100%); transition: transform 0.18s ease; z-index: 1000; box-shadow: 4px 0 20px rgba(0,0,0,0.2); overflow-y: auto; } .app-shell.qf-nav-open .sidebar { transform: translateX(0); } .app-main { padding-top: 60px; }
      /* Backdrop behind the open drawer — dims the page, tap to close. */
      .qf-nav-scrim { position: fixed; inset: 0; background: rgba(8, 11, 20, 0.55); opacity: 0; visibility: hidden; transition: opacity 0.18s ease, visibility 0.18s ease; z-index: 999; }
      .app-shell.qf-nav-open .qf-nav-scrim { opacity: 1; visibility: visible; } }
    html[data-theme="light"] .qf-nav-scrim { background: rgba(15, 23, 42, 0.42); }
    /* Trial bar spans full width and its text is centered; at mobile the fixed
       hamburger (left:12px, 40px wide) sits over the banner's left edge. Pad
       both sides symmetrically past the toggle so the centered text never tucks
       under the hamburger (clipping the leading "TRI"). !important beats the
       inline padding set in app.js. */
    @media (max-width: 900px) { #qf-trial-bar { padding-left: 60px !important; padding-right: 60px !important; } }
    body.qf-trial-locked .app-main input, body.qf-trial-locked .app-main select, body.qf-trial-locked .app-main textarea { pointer-events: none; opacity: 0.55; cursor: not-allowed; }
    body.qf-trial-locked .app-main .btn-primary, body.qf-trial-locked .app-main .btn-danger, body.qf-trial-locked .app-main button[data-mutate] { pointer-events: none; opacity: 0.55; cursor: not-allowed; }
  </style>
