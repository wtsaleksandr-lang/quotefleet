<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — QuoteFleet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topnav">
    <div class="topnav-inner">
      <a href="/" class="brand-mark">
        <span class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 17h2a3 3 0 0 0 3-3V7H3z"/><path d="M14 7h6l1 4v6h-3"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
        </span>
        QuoteFleet
      </a>
      <span class="topnav-spacer"></span>
      <a class="nav-link" href="/signup">New here?</a>
    </div>
  </header>

  <main style="display:flex; align-items:center; justify-content:center; min-height: calc(100vh - 80px); padding: 48px 24px;">
    <div class="card elevated" style="width: 100%; max-width: 460px;">
      <h1 style="font-size: 28px; margin: 0 0 22px 0; letter-spacing: -0.025em;">
        Sign in
      </h1>

      <div class="tabs" style="margin-bottom: 18px;">
        <button class="tab active" data-pane="link">Email link</button>
        <button class="tab" data-pane="pwd">Password</button>
      </div>

      <!-- Magic link (default) -->
      <div class="tab-pane active" id="pane-link">
        <form id="magic-form" style="display:flex; flex-direction:column; gap: 16px;">
          <div class="field">
            <label class="field-label required">Email</label>
            <input class="input" type="email" name="email" required autofocus>
          </div>
          <button class="btn btn-primary btn-lg btn-block" type="submit">
            Email me a link <span class="arr">→</span>
          </button>
          <div id="magic-msg" class="notice hidden"></div>
        </form>
      </div>

      <!-- Password fallback -->
      <div class="tab-pane" id="pane-pwd">
        <form id="login-form" style="display:flex; flex-direction:column; gap: 16px;">
          <div class="field">
            <label class="field-label required">Email</label>
            <input class="input" type="email" name="email" required>
          </div>
          <div class="field">
            <label class="field-label required">Password</label>
            <input class="input" type="password" name="password" required>
          </div>
          <button class="btn btn-primary btn-lg btn-block" type="submit">
            Sign in <span class="arr">→</span>
          </button>
          <div id="login-error" class="notice error hidden"></div>
        </form>
      </div>

      <p class="muted-small" style="text-align:center; margin-top: 24px;">
        New here? <a href="/signup">Start free →</a>
      </p>
    </div>
  </main>

  <script>
    // Tab toggle
    document.querySelectorAll('.tab').forEach(function (t) {
      t.addEventListener('click', function () {
        document.querySelectorAll('.tab').forEach(function (x) { x.classList.remove('active'); });
        document.querySelectorAll('.tab-pane').forEach(function (x) { x.classList.remove('active'); });
        t.classList.add('active');
        var p = document.getElementById('pane-' + t.dataset.pane);
        if (p) p.classList.add('active');
      });
    });

    // Surface magic-link errors propagated as ?error=...
    var qErr = new URLSearchParams(location.search).get('error');
    if (qErr) {
      var msg = document.getElementById('magic-msg');
      msg.textContent = ({
        'missing-token': 'Link is missing.',
        'invalid-token': 'Link is invalid or expired.',
        'link-used':     'Link was already used.',
        'link-expired':  'Link has expired.',
      })[qErr] || 'Sign-in failed.';
      msg.classList.remove('hidden'); msg.classList.add('error');
    }

    // Magic link send
    document.getElementById('magic-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var msg = document.getElementById('magic-msg');
      msg.classList.add('hidden');
      var btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true; var old = btn.innerHTML; btn.innerHTML = 'Sending…';
      try {
        var res = await fetch('/api/auth/magic-link/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: e.target.email.value }),
        });
        if (res.ok) {
          msg.textContent = '✓ Check your inbox.';
          msg.classList.remove('hidden', 'error'); msg.classList.add('notice');
        } else {
          var j = await res.json();
          msg.textContent = j.error || 'Send failed — try again.';
          msg.classList.remove('hidden'); msg.classList.add('error');
        }
      } catch (ex) {
        msg.textContent = 'Network error — try again.';
        msg.classList.remove('hidden'); msg.classList.add('error');
      } finally {
        btn.disabled = false; btn.innerHTML = old;
      }
    });

    // Password login (fallback)
    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var fd = new FormData(e.target);
      var err = document.getElementById('login-error');
      err.classList.add('hidden');
      var btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true; var old = btn.innerHTML; btn.innerHTML = 'Signing in…';
      try {
        var res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') }),
        });
        var j = await res.json();
        if (!res.ok) {
          err.textContent = j.error || 'Sign-in failed.';
          err.classList.remove('hidden');
          btn.disabled = false; btn.innerHTML = old;
          return;
        }
        if (j.role === 'super_admin') location.href = '/admin';
        else location.href = '/app';
      } catch (ex) {
        err.textContent = 'Network error — try again.';
        err.classList.remove('hidden');
        btn.disabled = false; btn.innerHTML = old;
      }
    });
  </script>
</body>
</html>
