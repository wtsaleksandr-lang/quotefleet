<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Get an instant freight quote</title>
  <link rel="stylesheet" href="/widget-style.css">
</head>
<body>
  <div class="qf-widget" id="qf-root">
    <div class="qf-header" id="qf-header"><div class="brand-name">Loading…</div></div>
    <div class="qf-tagline" id="qf-tagline"></div>

    <!-- Step 1: shipment details -->
    <div class="qf-step active" id="qf-step-quote">
      <div class="qf-tabs" id="qf-services"></div>

      <div class="qf-section-title qf-title-inline">
        Equipment
        <span class="qf-help" data-tip="The truck or container type. 53' Dry Van = standard enclosed trailer; Reefer = refrigerated; Flatbed = open deck; Container 20'/40'/45' = ocean container drayage.">?</span>
      </div>
      <select class="qf-select" id="qf-equipment"></select>

      <!-- Drayage-specific pickup: port + terminal + booking. Visible only when service=drayage. -->
      <div class="qf-drayage-only" id="qf-drayage-pickup" style="display:none;">
        <div class="qf-section-title qf-title-inline" style="margin-top:14px;">
          Pickup port / terminal
          <span class="qf-help" data-tip="Drayage starts at a marine terminal or rail ramp. If you are unsure of the exact terminal, pick the city and your dispatcher will confirm.">?</span>
        </div>
        <div class="qf-grid">
          <div class="qf-field qf-full qf-typeahead" id="qf-pickup-port-wrap">
            <label>Port / city</label>
            <input class="qf-input" id="qf-pickup-port-input" placeholder="Type a port or city — Los Angeles, Long Beach, Savannah…" autocomplete="off">
            <div class="qf-suggestions" id="qf-pickup-port-suggestions"></div>
          </div>
          <div class="qf-field qf-full">
            <label>
              Terminal
              <span class="qf-help" data-tip="The specific marine terminal or rail ramp. If you don't know, leave it as 'I don't know yet' and your dispatcher will check the booking.">?</span>
            </label>
            <select class="qf-select" id="qf-pickup-terminal">
              <option value="">— I don't know yet —</option>
            </select>
          </div>
        </div>
        <div class="qf-section-title qf-title-inline" style="margin-top:14px;">
          Booking
          <span class="qf-help" data-tip="Optional. Ocean carrier and booking number help your dispatcher confirm terminal and pickup requirements faster.">?</span>
        </div>
        <div class="qf-grid">
          <div class="qf-field">
            <label>
              Ocean carrier
              <span class="qf-help" data-tip="The shipping line carrying your container — Maersk, MSC, CMA CGM, Hapag-Lloyd, ONE, etc. Pick 'Not sure' if you don't know yet.">?</span>
            </label>
            <select class="qf-select" id="qf-ocean-carrier">
              <option value="">— Not sure —</option>
              <option>Maersk</option>
              <option>MSC</option>
              <option>CMA CGM</option>
              <option>Hapag-Lloyd</option>
              <option>ONE</option>
              <option>Evergreen</option>
              <option>COSCO / OOCL</option>
              <option>Yang Ming</option>
              <option>HMM</option>
              <option>ZIM</option>
              <option>Matson</option>
              <option>Other</option>
            </select>
          </div>
          <div class="qf-field">
            <label>
              Booking #
              <span class="qf-help" data-tip="Optional booking confirmation number from the ocean carrier.">?</span>
            </label>
            <input class="qf-input" id="qf-booking" placeholder="e.g. SINI12345678" autocomplete="off">
          </div>
        </div>
      </div>

      <!-- Default pickup: ZIP/city free-text. Visible for all non-drayage services. -->
      <div class="qf-non-drayage" id="qf-default-pickup">
        <div class="qf-section-title" style="margin-top:14px;">Pickup</div>
        <div class="qf-grid">
          <div class="qf-field qf-full qf-typeahead" data-typeahead="locations" data-target="pickup">
            <label>ZIP / city</label>
            <input class="qf-input" id="qf-pickup-zip" placeholder="e.g. 90802 or Long Beach, CA" autocomplete="off">
            <div class="qf-suggestions" id="qf-pickup-suggestions"></div>
          </div>
        </div>
      </div>

      <div class="qf-section-title" style="margin-top:14px;">Delivery</div>
      <div class="qf-grid">
        <div class="qf-field qf-full qf-typeahead" data-typeahead="locations" data-target="delivery">
          <label>ZIP / city</label>
          <input class="qf-input" id="qf-delivery-zip" placeholder="e.g. 60606 or Chicago, IL" autocomplete="off">
          <div class="qf-suggestions" id="qf-delivery-suggestions"></div>
        </div>
      </div>

      <div class="qf-section-title qf-title-inline" style="margin-top:14px;">
        Cargo
        <span class="qf-help" data-tip="Approximate weight is fine. Very heavy shipments may need overweight equipment or permits.">?</span>
      </div>
      <div class="qf-grid">
        <div class="qf-field qf-full">
          <label>Weight (lbs)</label>
          <input class="qf-input" id="qf-weight" type="number" min="0" placeholder="e.g. 38000">
        </div>
      </div>

      <div class="qf-flags">
        <label>
          <input type="checkbox" id="qf-residential"> <span>Residential</span>
          <span class="qf-help" data-tip="Delivery is to a home, not a business, dock, or warehouse. Residential delivery may require a surcharge.">?</span>
        </label>
        <label>
          <input type="checkbox" id="qf-hazmat"> <span>Hazmat</span>
          <span class="qf-help" data-tip="Cargo is classified hazardous and may require placards, eligible drivers, and carrier approval.">?</span>
        </label>
        <label>
          <input type="checkbox" id="qf-temp"> <span>Temp-control</span>
          <span class="qf-help" data-tip="Cargo needs a refrigerated or temperature-controlled unit.">?</span>
        </label>
      </div>

      <div class="qf-section-title qf-title-inline" style="margin-top:14px;">
        Add-ons
        <span class="qf-title-muted">optional</span>
        <span class="qf-help" data-tip="Extra services beyond a basic linehaul. Add only the ones you need.">?</span>
      </div>
      <div class="qf-accessorials" id="qf-accessorials"></div>

      <button class="qf-cta" id="qf-calc-btn">Calculate quote</button>
      <div id="qf-error" class="qf-error" style="display:none;"></div>

      <!-- Result preview -->
      <div class="qf-result" id="qf-result" style="display:none;">
        <div class="qf-section-title" style="margin:0 0 8px 0;">Estimated total</div>
        <div class="total"><span class="currency">$</span><span id="qf-total">0</span></div>
        <div class="meta" id="qf-meta"></div>
        <div class="lines" id="qf-lines"></div>
        <button class="qf-cta" id="qf-continue-btn" style="margin-top:14px;">Continue — get this quote in writing</button>
      </div>
    </div>

    <!-- Step 2: contact form -->
    <div class="qf-step" id="qf-step-contact">
      <div class="qf-section-title">Almost done</div>
      <p class="qf-tagline">We'll email this quote and our dispatcher will follow up. No spam.</p>

      <div class="qf-grid">
        <div class="qf-field qf-full">
          <label>Your name</label>
          <input class="qf-input" id="qf-c-name" placeholder="Jane Doe">
        </div>
        <div class="qf-field">
          <label id="qf-c-email-label">Email</label>
          <input class="qf-input" id="qf-c-email" type="email" placeholder="you@company.com">
        </div>
        <div class="qf-field">
          <label id="qf-c-phone-label">Phone (optional)</label>
          <input class="qf-input" id="qf-c-phone" placeholder="optional">
        </div>
        <div class="qf-field qf-full">
          <label>Company</label>
          <input class="qf-input" id="qf-c-company" placeholder="Company name">
        </div>
        <div class="qf-field qf-full">
          <label>Notes</label>
          <textarea class="qf-input" id="qf-c-notes" rows="3" placeholder="Pickup hours, loading details, reference number…"></textarea>
        </div>
      </div>

      <button class="qf-cta" id="qf-submit-btn">Get written quote</button>
      <button class="qf-cta qf-secondary" id="qf-back-btn" style="margin-top:8px;">Back</button>
      <div id="qf-submit-error" class="qf-error" style="display:none;"></div>
    </div>

    <!-- Step 3: thanks -->
    <div class="qf-step" id="qf-step-thanks">
      <div class="qf-success" id="qf-thanks-msg"></div>
      <p class="qf-tagline" id="qf-thanks-detail" style="margin-top:12px;"></p>

      <div class="qf-chat-toggle" id="qf-chat-toggle">
        <button id="qf-chat-open-btn" type="button">Ask a question about this quote</button>
      </div>
      <div class="qf-chat" id="qf-chat" style="display:none;">
        <div class="qf-chat-msgs" id="qf-chat-msgs"></div>
        <div class="qf-chat-input-row">
          <input class="qf-input" id="qf-chat-input" placeholder="Ask about transit time, accessorials, pickup readiness…">
          <button class="qf-cta qf-chat-send" id="qf-chat-send" type="button">Send</button>
        </div>
      </div>

      <div class="qf-chat-toggle" id="qf-callback-toggle">
        <button id="qf-callback-open-btn" type="button">Request a callback</button>
      </div>
      <div class="qf-chat" id="qf-callback-form" style="display:none;">
        <div class="qf-grid">
          <div class="qf-field qf-full">
            <label>Phone</label>
            <input class="qf-input" id="qf-cb-phone" placeholder="(555) 555-1234">
          </div>
          <div class="qf-field qf-full">
            <label>Best time</label>
            <input class="qf-input" id="qf-cb-time" placeholder="Today after 2pm">
          </div>
          <div class="qf-field qf-full">
            <label>What should we discuss?</label>
            <input class="qf-input" id="qf-cb-topic" placeholder="Question about accessorials, pickup, quote validity…">
          </div>
        </div>
        <button class="qf-cta" id="qf-cb-send-btn" type="button">Send callback request</button>
        <button class="qf-cta qf-secondary" id="qf-cb-cancel-btn" type="button" style="margin-top:8px;">Cancel</button>
        <div id="qf-cb-error" class="qf-error" style="display:none;"></div>
        <div id="qf-cb-success" class="qf-success" style="display:none;"></div>
      </div>

      <button class="qf-cta qf-secondary" id="qf-restart-btn" style="margin-top:14px;">Start another quote</button>
    </div>

    <div class="qf-footer" id="qf-powered"></div>
  </div>

  <script src="/widget.js"></script>
</body>
</html>
