<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuoteFleet — live calculator demo</title>
  <meta name="description" content="Try the QuoteFleet branded rate calculator live — switch between desktop and mobile, light and dark.">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/brand/apple-touch-icon-180.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0b0f15">
  <style>
    .qfd-body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink, #e7ecf3);
      font-family: var(--font-sans, "Satoshi", system-ui, sans-serif);
      background:
        radial-gradient(ellipse 70% 40% at 50% -8%, rgba(13,60,252,.12), transparent 64%),
        linear-gradient(180deg, #0a1018 0%, #0d1219 45%, #0b0f15 100%);
    }
    .qfd-wrap { max-width: 1040px; margin: 0 auto; padding: 24px 20px 56px; }
    .qfd-topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .qfd-brand { display: inline-flex; align-items: center; gap: 10px; color: #f2f5fb; font-weight: 700; font-size: 17px; letter-spacing: -0.02em; text-decoration: none; }
    .qfd-brand img { height: 28px; width: auto; display: block; }
    .qfd-controls { display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .qfd-seg {
      display: inline-flex; padding: 3px; gap: 3px;
      background: rgba(148,163,184,.10);
      border: 1px solid rgba(148,163,184,.20);
      border-radius: 999px;
    }
    .qfd-seg button {
      appearance: none; border: 0; cursor: pointer;
      font: 600 12.5px/1 var(--font-sans, "Satoshi", system-ui, sans-serif);
      color: #aab6c8; background: transparent;
      padding: 8px 15px; border-radius: 999px;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background .16s ease, color .16s ease;
    }
    .qfd-seg button svg { width: 15px; height: 15px; }
    .qfd-seg button[aria-pressed="true"] { background: #0D3CFC; color: #fff; }
    .qfd-seg button:not([aria-pressed="true"]):hover { color: #e7ecf3; }
    .qfd-seg-label { font: 600 11px/1 var(--font-mono, ui-monospace, monospace); letter-spacing: .08em; text-transform: uppercase; color: #7c8798; margin-right: 2px; }

    .qfd-intro { text-align: center; margin: 4px auto 26px; max-width: 640px; }
    .qfd-intro h1 { margin: 0 0 8px; font-size: clamp(24px, 4vw, 34px); letter-spacing: -0.03em; color: #f4f7fc; }
    .qfd-intro p { margin: 0; color: #94a3b8; font-size: 15px; line-height: 1.55; }

    .qfd-stage { display: flex; justify-content: center; }
    /* Desktop frame — browser-style card */
    .qfd-device {
      width: 100%; max-width: 760px;
      border-radius: 20px; overflow: hidden;
      border: 1px solid rgba(148,163,184,.18);
      background: #0d1219;
      box-shadow: 0 40px 90px -50px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.04);
      transition: max-width .32s cubic-bezier(.4,0,.2,1), border-radius .32s ease;
    }
    .qfd-chrome {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 14px; border-bottom: 1px solid rgba(148,163,184,.14);
      background: rgba(255,255,255,.02);
    }
    .qfd-dot { width: 10px; height: 10px; border-radius: 999px; background: #35404f; }
    .qfd-url {
      margin-left: 10px; flex: 1; min-width: 0;
      font: 500 11.5px/1 var(--font-mono, ui-monospace, monospace);
      color: #8b97a8; background: rgba(148,163,184,.08);
      padding: 6px 12px; border-radius: 999px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .qfd-frame { display: block; width: 100%; height: 820px; border: 0; background: transparent; }

    /* Mobile mode — phone bezel */
    .qfd-stage.is-mobile .qfd-device {
      max-width: 390px; border-radius: 40px;
      border: 10px solid #0f151d;
      box-shadow: 0 40px 90px -46px rgba(0,0,0,.9), 0 0 0 1px rgba(148,163,184,.20), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .qfd-stage.is-mobile .qfd-chrome { display: none; }
    .qfd-stage.is-mobile .qfd-frame { height: 780px; }

    .qfd-foot { text-align: center; margin-top: 26px; }
    .qfd-cta {
      display: inline-flex; align-items: center; gap: 8px;
      background: #0D3CFC; color: #fff; text-decoration: none;
      font-weight: 700; font-size: 14.5px;
      padding: 12px 22px; border-radius: 12px;
      box-shadow: 0 18px 42px -28px rgba(13,60,252,.85), inset 0 1px 0 rgba(255,255,255,.18);
      transition: background .16s ease;
    }
    .qfd-cta:hover { background: #0B34D6; }
    .qfd-foot p { margin: 12px 0 0; color: #7c8798; font-size: 12.5px; }
    .qfd-foot a.qfd-plain { color: #6E8BFF; }

    @media (max-width: 560px) {
      .qfd-topbar { justify-content: center; }
      .qfd-controls { justify-content: center; }
    }
    @media (prefers-reduced-motion: reduce) {
      .qfd-device { transition: none; }
    }
  </style>
</head>
<body class="qfd-body">
  <div class="qfd-wrap">
    <div class="qfd-topbar">
      <a class="qfd-brand" href="/"><img src="/brand/mark-keys.png" alt="QuoteFleet" width="28" height="30" decoding="async">QuoteFleet</a>
      <div class="qfd-controls">
        <div class="qfd-seg" role="group" aria-label="Device preview">
          <span class="qfd-seg-label">View</span>
          <button type="button" id="qfd-desktop" aria-pressed="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Desktop
          </button>
          <button type="button" id="qfd-mobile" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="2" width="12" height="20" rx="3"/><path d="M11 18h2"/></svg>Mobile
          </button>
        </div>
        <div class="qfd-seg" role="group" aria-label="Theme preview">
          <span class="qfd-seg-label">Theme</span>
          <button type="button" id="qfd-dark" aria-pressed="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>Dark
          </button>
          <button type="button" id="qfd-light" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>Light
          </button>
        </div>
      </div>
    </div>

    <div class="qfd-intro">
      <h1>Your branded rate calculator — live.</h1>
      <p>This is the real, interactive widget your customers use. Try a quote, then switch between desktop and mobile, light and dark.</p>
    </div>

    <div class="qfd-stage" id="qfd-stage">
      <div class="qfd-device">
        <div class="qfd-chrome">
          <span class="qfd-dot"></span><span class="qfd-dot"></span><span class="qfd-dot"></span>
          <span class="qfd-url" id="qfd-url">yourcompany.quotefleet.net</span>
        </div>
        <iframe class="qfd-frame" id="qfd-frame" title="Live QuoteFleet calculator demo" src="/w/demo?raw=1&amp;preset=midnight" loading="eager"></iframe>
      </div>
    </div>

    <div class="qfd-foot">
      <a class="qfd-cta" href="/signup">Get your own calculator <span aria-hidden="true">→</span></a>
      <p>Free 14-day trial · <a class="qfd-plain" href="/pricing">see plans</a></p>
    </div>
  </div>

  <script>
    (function () {
      var frame = document.getElementById('qfd-frame');
      var stage = document.getElementById('qfd-stage');
      var THEME = { dark: 'midnight', light: 'cream' };
      var state = { device: 'desktop', theme: 'dark' };

      function press(id, on) {
        var el = document.getElementById(id);
        if (el) el.setAttribute('aria-pressed', on ? 'true' : 'false');
      }
      function setDevice(d) {
        state.device = d;
        stage.classList.toggle('is-mobile', d === 'mobile');
        press('qfd-desktop', d === 'desktop');
        press('qfd-mobile', d === 'mobile');
      }
      function setTheme(t) {
        if (state.theme === t) return;
        state.theme = t;
        press('qfd-dark', t === 'dark');
        press('qfd-light', t === 'light');
        // Reload the widget with the chosen preset (config re-resolves theme).
        frame.src = '/w/demo?raw=1&preset=' + encodeURIComponent(THEME[t]);
      }

      document.getElementById('qfd-desktop').addEventListener('click', function () { setDevice('desktop'); });
      document.getElementById('qfd-mobile').addEventListener('click', function () { setDevice('mobile'); });
      document.getElementById('qfd-dark').addEventListener('click', function () { setTheme('dark'); });
      document.getElementById('qfd-light').addEventListener('click', function () { setTheme('light'); });
    })();
  </script>
</body>
</html>
