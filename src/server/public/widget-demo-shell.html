<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuoteFleet — live calculator demo</title>
  <meta name="description" content="Try the QuoteFleet branded rate calculator live — switch between desktop and mobile, light and dark.">
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/brand/apple-touch-icon-180.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0b0f15">
  <style>
    .qfd-body {
      margin: 0;
      position: relative;
      min-height: 100vh;
      color: var(--ink, #e7ecf3);
      font-family: var(--font-sans, "Satoshi", system-ui, sans-serif);
      background:
        radial-gradient(ellipse 70% 40% at 50% -8%, rgba(13,60,252,.12), transparent 64%),
        linear-gradient(180deg, #0a1018 0%, #0d1219 45%, #0b0f15 100%);
    }
    /* Subtle dotted "canvas" grid — reinforces the software/tool feel. Kept
       faint and masked so it fades out behind the calculator content. */
    .qfd-body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(168,182,204,0.20) 1px, transparent 1.6px);
      background-size: 22px 22px;
      -webkit-mask-image: radial-gradient(ellipse 120% 80% at 50% 0%, #000 0%, rgba(0,0,0,.5) 52%, transparent 82%);
              mask-image: radial-gradient(ellipse 120% 80% at 50% 0%, #000 0%, rgba(0,0,0,.5) 52%, transparent 82%);
    }
    .qfd-wrap { position: relative; z-index: 1; max-width: 1040px; margin: 0 auto; padding: 24px 20px 56px; }

    /* Brand lockup — logo + name + a subtle selling tagline (demo page only).
       Tagline color #9fb0c9 on the dark shell ≈ 8:1 contrast (WCAG AA/AAA). */
    .qfd-head { display: flex; align-items: center; gap: 12px; }
    .qfd-brand { display: inline-flex; align-items: center; gap: 10px; color: #f2f5fb; font-weight: 700; font-size: 17px; letter-spacing: -0.02em; text-decoration: none; flex-shrink: 0; }
    .qfd-brand img { height: 28px; width: auto; display: block; }
    .qfd-tag {
      padding-left: 12px;
      border-left: 1px solid rgba(148,163,184,.28);
      color: #9fb0c9;
      font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace);
      font-weight: 500;
      font-size: 11px;
      letter-spacing: .01em;
      line-height: 1.4;
      white-space: nowrap;
    }
    /* Phones: keep the tagline on ONE line to the right of the brand by
       tightening the whole header — smaller logo/wordmark, tighter gaps,
       less side padding — rather than stacking it. */
    @media (max-width: 560px) {
      .qfd-wrap { padding: 20px 12px 48px; }
      .qfd-brand { gap: 6px; font-size: 14.5px; }
      .qfd-brand img { height: 22px; }
      .qfd-head { gap: 7px; }
      .qfd-tag { padding-left: 7px; font-size: 10px; letter-spacing: 0; }
    }

    /* Toolbar — compact icon-only toggles, single row, right-aligned to the
       calculator card's edge (matches the card's max-width so it tracks the
       card in both desktop and mobile modes). */
    .qfd-toolbar {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 10px; flex-wrap: nowrap;
      width: 100%; max-width: 690px;
      margin: 22px auto 12px;
    }
    .qfd-wrap.is-mobile .qfd-toolbar { max-width: 390px; }
    .qfd-seg {
      display: inline-flex; padding: 2px; gap: 2px;
      background: rgba(148,163,184,.10);
      border: 1px solid rgba(148,163,184,.16);
      border-radius: 9px;
    }
    .qfd-seg[hidden] { display: none; }
    .qfd-seg button {
      appearance: none; border: 0; cursor: pointer; background: transparent;
      color: #8b97a8; padding: 5px 9px; border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .16s ease, color .16s ease, box-shadow .16s ease;
    }
    .qfd-seg button svg { width: 11px; height: 11px; display: block; }
    .qfd-seg button[aria-pressed="true"] {
      background: rgba(255,255,255,.12);
      color: #f4f7fc;
      box-shadow: 0 1px 2px rgba(0,0,0,.35);
    }
    .qfd-seg button:not([aria-pressed="true"]):hover { color: #e2e8f1; }

    .qfd-stage { display: flex; justify-content: center; }
    /* Desktop frame — browser-style card */
    .qfd-device {
      width: 100%; max-width: 690px;
      border-radius: 20px; overflow: hidden;
      border: 1px solid rgba(148,163,184,.18);
      background: #0d1219;
      box-shadow: 0 40px 90px -50px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.04);
      transition: max-width .32s cubic-bezier(.4,0,.2,1), border-radius .32s ease;
    }
    .qfd-chrome {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 14px; border-bottom: 1px solid rgba(148,163,184,.14);
      background: rgba(255,255,255,.02);
    }
    .qfd-dot { width: 10px; height: 10px; border-radius: 999px; background: #35404f; }
    .qfd-url {
      margin-left: 10px; flex: 0 1 auto; max-width: 360px; min-width: 0;
      display: inline-flex; align-items: center; gap: 7px;
      font: 500 11.5px/1 var(--font-mono, ui-monospace, monospace);
      color: #8b97a8; background: rgba(148,163,184,.08);
      padding: 6px 12px; border-radius: 999px;
      overflow: hidden; white-space: nowrap;
    }
    .qfd-lock { width: 11px; height: 11px; flex-shrink: 0; opacity: .7; }
    .qfd-url span { overflow: hidden; text-overflow: ellipsis; }
    /* Height is auto-sized in JS from the widget's reported content height, so
       there is NO inner scrollbar — the page scrolls as one surface. This is
       just the pre-load fallback. */
    .qfd-frame { display: block; width: 100%; height: 560px; border: 0; background: transparent; }

    /* Desktop preview of the phone (device toggle → Mobile): phone bezel with a
       REAL fixed phone viewport (412×780 outer, ≈392×760 inner → ~2:1, a true
       phone aspect, not the old over-elongated ~2.7:1 strip). overflow:hidden
       (inherited) clips the iframe's native scrollbar so scrolling happens
       cleanly INSIDE the frame. */
    .qfd-stage.is-mobile .qfd-device {
      max-width: 412px; height: 780px; border-radius: 40px;
      border: 10px solid #0f151d;
      box-shadow: 0 40px 90px -46px rgba(0,0,0,.9), 0 0 0 1px rgba(148,163,184,.20), inset 0 1px 0 rgba(255,255,255,.05);
    }
    /* Fill the fixed bezel and push the iframe's own scrollbar into the 20px of
       overhang that the device's overflow:hidden clips → internal scroll, no
       visible scrollbar. Overrides the JS-set inline height (suppressed in JS). */
    .qfd-stage.is-mobile .qfd-frame {
      height: 100% !important;
      width: calc(100% + 20px) !important;
    }
    .qfd-stage.is-mobile .qfd-chrome { display: none; }

    /* On a REAL phone the desktop mockup is dropped — the widget shows directly
       at its natural (auto-sized) height, so there's a single page scroll and
       no nested container. A minimal centered address bar keeps the branded
       "your own page" cue; the traffic-lights and the device toggle are hidden. */
    @media (max-width: 768px) {
      #qfd-device-seg { display: none !important; }
      .qfd-toolbar { max-width: 100%; }
      .qfd-device {
        max-width: 100%; border-radius: 14px;
        box-shadow: 0 24px 60px -46px rgba(0,0,0,.8);
      }
      .qfd-chrome { padding: 9px 12px; justify-content: center; }
      .qfd-chrome .qfd-dot { display: none; }
      .qfd-url {
        margin-left: 0; flex: 0 1 auto; justify-content: center;
        background: transparent; padding: 2px 6px;
      }
    }

    .qfd-foot { text-align: center; margin-top: 26px; }
    .qfd-cta {
      display: inline-flex; align-items: center; gap: 8px;
      background: #0D3CFC; color: #fff; text-decoration: none;
      font-weight: 700; font-size: 14.5px;
      padding: 12px 22px; border-radius: 12px;
      box-shadow: 0 18px 42px -28px rgba(13,60,252,.85), inset 0 1px 0 rgba(255,255,255,.18);
      transition: background .16s ease;
    }
    .qfd-cta:hover { background: #0B34D6; }
    .qfd-foot p { margin: 12px 0 0; color: #7c8798; font-size: 12.5px; }
    .qfd-foot a.qfd-plain { color: #6E8BFF; }

    @media (prefers-reduced-motion: reduce) {
      .qfd-device { transition: none; }
    }
  </style>
</head>
<body class="qfd-body">
  <div class="qfd-wrap">
    <div class="qfd-head">
      <a class="qfd-brand" href="/"><img src="/brand/mark-keys-ondark.png" alt="QuoteFleet" width="28" height="30" decoding="async">QuoteFleet</a>
      <span class="qfd-tag">Instant Rates. Higher Conversions.</span>
    </div>

    <div class="qfd-toolbar">
      <div class="qfd-seg" id="qfd-device-seg" role="group" aria-label="Device preview">
        <button type="button" id="qfd-desktop" aria-pressed="true" aria-label="Desktop preview" title="Desktop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </button>
        <button type="button" id="qfd-mobile" aria-pressed="false" aria-label="Mobile preview" title="Mobile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="2" width="12" height="20" rx="3"/><path d="M11 18h2"/></svg>
        </button>
      </div>
      <div class="qfd-seg" role="group" aria-label="Theme preview">
        <button type="button" id="qfd-dark" aria-pressed="true" aria-label="Dark theme" title="Dark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
        <button type="button" id="qfd-light" aria-pressed="false" aria-label="Light theme" title="Light">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
      </div>
    </div>

    <div class="qfd-stage" id="qfd-stage">
      <div class="qfd-device">
        <div class="qfd-chrome">
          <span class="qfd-dot"></span><span class="qfd-dot"></span><span class="qfd-dot"></span>
          <span class="qfd-url" id="qfd-url"><svg class="qfd-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg><span>yourcompany.quotefleet.net</span>
        </div>
        <iframe class="qfd-frame" id="qfd-frame" title="Live QuoteFleet calculator demo" src="/w/demo?raw=1&amp;preset=midnight" loading="eager"></iframe>
      </div>
    </div>

    <div class="qfd-foot">
      <a class="qfd-cta" href="/signup">Get your own calculator <span aria-hidden="true">→</span></a>
      <p>Free 14-day trial · <a class="qfd-plain" href="/pricing">see plans</a></p>
    </div>
  </div>

  <script>
    (function () {
      var frame = document.getElementById('qfd-frame');
      var stage = document.getElementById('qfd-stage');
      var wrap = document.querySelector('.qfd-wrap');
      var THEME = { dark: 'midnight', light: 'cream' };
      var state = { device: 'desktop', theme: 'dark' };

      function press(id, on) {
        var el = document.getElementById(id);
        if (el) el.setAttribute('aria-pressed', on ? 'true' : 'false');
      }
      function setDevice(d) {
        state.device = d;
        stage.classList.toggle('is-mobile', d === 'mobile');
        wrap.classList.toggle('is-mobile', d === 'mobile');
        press('qfd-desktop', d === 'desktop');
        press('qfd-mobile', d === 'mobile');
      }
      function setTheme(t) {
        if (state.theme === t) return;
        state.theme = t;
        press('qfd-dark', t === 'dark');
        press('qfd-light', t === 'light');
        // Reload the widget with the chosen preset (config re-resolves theme).
        frame.src = '/w/demo?raw=1&preset=' + encodeURIComponent(THEME[t]);
      }

      document.getElementById('qfd-desktop').addEventListener('click', function () { setDevice('desktop'); });
      document.getElementById('qfd-mobile').addEventListener('click', function () { setDevice('mobile'); });
      document.getElementById('qfd-dark').addEventListener('click', function () { setTheme('dark'); });
      document.getElementById('qfd-light').addEventListener('click', function () { setTheme('light'); });

      // Auto-size the iframe to the widget's own content height so there is NO
      // inner scrollbar — the widget reports its height via postMessage on every
      // change (QF_WIDGET_HEIGHT). The whole page then scrolls as one surface,
      // on desktop and mobile alike. (The real-phone / desktop split — mockup vs
      // direct widget, and hiding the device toggle — is handled in CSS via the
      // 768px media query, which is more reliable than a JS viewport check.)
      var MINH = 560;
      function setH(h) {
        // In mobile mode the device has a FIXED phone viewport (CSS 780px) and
        // the iframe scrolls internally — don't override that with content height.
        if (state.device === 'mobile') return;
        if (h && isFinite(h)) frame.style.height = Math.max(MINH, Math.ceil(h)) + 'px';
      }
      // Same-origin: size immediately on load so there's no fallback-height flash.
      frame.addEventListener('load', function () {
        try { setH(frame.contentDocument.documentElement.scrollHeight); } catch (e) { /* ignore */ }
      });
      // And keep in sync as the widget grows/shrinks (add-ons, results, chat).
      window.addEventListener('message', function (e) {
        var d = e.data;
        if (d && d.type === 'QF_WIDGET_HEIGHT') setH(d.height);
      });
    })();
  </script>
</body>
</html>
