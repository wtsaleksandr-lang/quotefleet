name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SESSION_SECRET: testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest
      DATABASE_URL: postgresql://user:pass@localhost:5432/quotefleet_test
      ANTHROPIC_API_KEY: sk-test
      PUBLIC_BASE_URL: http://localhost:3000
      HOST_DOMAINS: quotefleet.net,localhost
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
